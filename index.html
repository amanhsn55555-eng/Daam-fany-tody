<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>الدعم الفني • منصتي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Tajawal',sans-serif}
    body{background:linear-gradient(145deg,#f5f7fa,#e8eef5);min-height:100vh;color:#0f172a}
    
    .header{
      position:fixed;top:0;left:0;right:0;z-index:999;
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1);
      border-radius:0 0 25px 25px;padding:12px 16px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .header h2{font-size:18px;font-weight:800}
    .header h2 i{color:#3b82f6}
    .back-btn{cursor:pointer;color:#64748b;font-size:20px}

    .container{
      margin-top:65px;padding:12px;max-width:600px;margin-left:auto;margin-right:auto;
      padding-bottom:80px;
    }

    .msg{
      display:flex;align-items:flex-end;gap:8px;margin-bottom:14px;
    }
    .msg.mine{justify-content:flex-end}
    .msg-av{
      width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:15px;border:2px solid;flex-shrink:0;overflow:hidden;
    }
    .msg-av img{width:100%;height:100%;object-fit:cover}
    .msg-b{
      max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;word-break:break-word;
    }
    .msg:not(.mine) .msg-b{background:#fff;border-bottom-right-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
    .msg.mine .msg-b{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border-bottom-left-radius:4px}
    .msg-t{font-size:10px;opacity:0.7;margin-top:3px}

    .input-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:998;
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8;
      border-radius:25px 25px 0 0;padding:10px 16px 16px;
      display:flex;gap:8px;max-width:600px;margin:0 auto;
    }
    .input-bar input{flex:1;border:none;padding:12px 16px;border-radius:25px;background:#f1f5f9;font-size:14px;outline:none}
    .input-bar button{
      width:42px;height:42px;border-radius:50%;border:none;
      background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:16px;cursor:pointer;
    }

    .start-box{text-align:center;padding:50px 20px}
    .start-box i{font-size:55px;color:#3b82f6;margin-bottom:14px}
    .start-box button{
      background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;
      padding:14px 30px;border-radius:30px;font-weight:700;font-size:15px;cursor:pointer;
    }

    .admin-btn{
      position:fixed;bottom:80px;left:14px;z-index:1000;
      background:#3b82f6;color:#fff;border:none;padding:10px 16px;
      border-radius:30px;font-weight:700;font-size:13px;cursor:pointer;
      box-shadow:0 4px 15px rgba(59,130,246,0.3);
    }

    .admin-modal{
      position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);
      z-index:2000;display:none;align-items:center;justify-content:center;
    }
    .admin-modal.show{display:flex}
    .admin-box{
      background:linear-gradient(145deg,#f8fafc,#e2e8f0);
      box-shadow:inset 2px 2px 5px #fff,inset -2px -2px 5px #94a3b8,3px 3px 8px rgba(0,0,0,0.1);
      border-radius:25px;padding:18px;width:94%;max-width:500px;max-height:80vh;overflow-y:auto;
    }
    .ticket-card{
      background:#fff;border-radius:16px;padding:14px;margin:8px 0;
      box-shadow:0 2px 6px rgba(0,0,0,0.04);cursor:pointer;
      border-right:3px solid #3b82f6;
    }
    .ticket-card:hover{background:#f8fafc}

    #toast{
      position:fixed;bottom:100px;left:20px;right:20px;text-align:center;
      background:#1e293b;color:#fff;padding:12px 20px;border-radius:30px;
      z-index:5000;opacity:0;transition:0.3s;pointer-events:none;
      max-width:350px;margin:0 auto;font-weight:600;
    }
    #toast.show{opacity:1;bottom:110px}
    .empty{text-align:center;padding:40px;color:#94a3b8}
    .empty i{font-size:45px;opacity:0.3;margin-bottom:10px}
  </style>
</head>
<body>

<div class="header">
  <div class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></div>
  <h2><i class="fas fa-headset"></i> الدعم الفني</h2>
  <div style="width:24px"></div>
</div>

<div class="container" id="msgContainer">
  <div class="start-box" id="startBox">
    <i class="fas fa-headset"></i>
    <h3>الدعم الفني</h3>
    <p style="color:#64748b;margin:8px 0 18px;">افتح تذكرة للتواصل مع الدعم</p>
    <button onclick="createTicket()"><i class="fas fa-plus"></i> فتح تذكرة</button>
  </div>
</div>

<div class="input-bar" id="inputBar" style="display:none">
  <input type="text" id="msgInput" placeholder="اكتب رسالتك...">
  <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
</div>

<div id="toast"></div>

<div class="admin-modal" id="adminModal">
  <div class="admin-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3><i class="fas fa-ticket-alt"></i> طلبات الدعم</h3>
      <button onclick="document.getElementById('adminModal').classList.remove('show')" style="background:none;border:none;font-size:20px;cursor:pointer">&times;</button>
    </div>
    <div id="ticketsList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, onSnapshot, addDoc, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPBrZMo6IYCwCDYV3HEfNcUmLUITR6VRc",
  authDomain: "elahbes.firebaseapp.com",
  projectId: "elahbes",
  storageBucket: "elahbes.firebasestorage.app",
  messagingSenderId: "800207969145",
  appId: "1:800207969145:web:aa19b725d1c92dd48fada8",
  measurementId: "G-EFT566SJMP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "ad5@5.com";

let me = null, myData = null, isAdmin = false, ticketId = null, unsub = null;

function toast(m, ok){ ok = ok!==false;
  var t = document.getElementById('toast'); t.textContent = m;
  t.style.background = ok ? '#10b981' : '#ef4444';
  t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function av(u){ if(!u) return '👤'; if(u.avatarType==='image'&&u.avatarUrl) return '<img src="'+u.avatarUrl+'" style="width:100%;height:100%;object-fit:cover">'; return u.emoji||'👤'; }
function ft(ts){ if(!ts) return ''; var d=new Date(ts); return d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}); }

async function loadMe(uid){
  var d = await getDoc(doc(db,"users",uid));
  myData = d.exists() ? d.data() : { username:'مستخدم', emoji:'👤', userId:uid.slice(0,6), email:'' };
  myData.uid = uid;
  isAdmin = (myData.email === ADMIN_EMAIL);
  
  if(isAdmin){
    var btn = document.createElement('button');
    btn.className = 'admin-btn';
    btn.innerHTML = '<i class="fas fa-ticket-alt"></i> التذاكر';
    btn.onclick = showTickets;
    document.body.appendChild(btn);
  }
  
  await findMyTicket();
}

async function findMyTicket(){
  if(isAdmin){ document.getElementById('startBox').innerHTML = '<div class="empty"><i class="fas fa-headset"></i><p>اضغط على زر التذاكر للمشاهدة</p></div>'; return; }
  
  var all = await getDocs(collection(db,"support_tickets"));
  var found = null;
  all.forEach(function(d){ var t = d.data(); if(t.uid === me.uid && t.status === 'open') found = d.id; });
  
  if(found){ openTicket(found); }
  else { document.getElementById('startBox').style.display = 'block'; document.getElementById('inputBar').style.display = 'none'; }
}

window.createTicket = async function(){
  if(!me) return;
  var all = await getDocs(collection(db,"support_tickets"));
  var exists = false;
  all.forEach(function(d){ if(d.data().uid === me.uid && d.data().status === 'open') exists = true; });
  if(exists){ toast('لديك تذكرة مفتوحة بالفعل', false); return; }
  
  var ref = await addDoc(collection(db,"support_tickets"), {
    uid: me.uid, userName: myData.username||'مستخدم', userEmoji: myData.emoji||'👤',
    userAvatarType: myData.avatarType||'emoji', userAvatarUrl: myData.avatarUrl||'',
    userColors: myData.colors||{}, userEmail: myData.email||'',
    status: 'open', createdAt: Date.now(), updatedAt: Date.now(), lastMsg: ''
  });
  ticketId = ref.id;
  document.getElementById('startBox').style.display = 'none';
  document.getElementById('inputBar').style.display = 'flex';
  listen(ticketId);
  toast('✅ تم فتح التذكرة');
};

window.sendMsg = async function(){
  var inp = document.getElementById('msgInput');
  var txt = inp.value.trim();
  if(!txt || !ticketId || !me) return;
  
  await addDoc(collection(db,"support_tickets",ticketId,"messages"), {
    senderId: me.uid, text: txt, timestamp: Date.now()
  });
  await updateDoc(doc(db,"support_tickets",ticketId), { lastMsg: txt.substring(0,80), updatedAt: Date.now() });
  inp.value = '';
};

function listen(tid){
  if(unsub) unsub();
  var q = query(collection(db,"support_tickets",tid,"messages"), orderBy("timestamp","asc"));
  unsub = onSnapshot(q, function(snap){
    var html = '';
    snap.forEach(function(d){
      var m = d.data();
      var isMe = m.senderId === me.uid;
      html += '<div class="msg '+(isMe?'mine':'')+'">'+
        (isMe?'':'<div class="msg-av" style="border-color:#3b82f6"><i class="fas fa-headset"></i></div>')+
        '<div class="msg-b"><div>'+m.text+'</div><div class="msg-t">'+ft(m.timestamp)+'</div></div>'+
        (isMe?'<div class="msg-av" style="border-color:'+(myData.colors?.frame||'#3b82f6')+';">'+av(myData)+'</div>':'')+
        '</div>';
    });
    document.getElementById('msgContainer').innerHTML = html || '<div class="empty"><i class="fas fa-clock"></i><p>في انتظار الرد...</p></div>';
    document.getElementById('msgContainer').scrollTop = document.getElementById('msgContainer').scrollHeight;
  });
}

function openTicket(tid){
  ticketId = tid;
  document.getElementById('startBox').style.display = 'none';
  document.getElementById('inputBar').style.display = 'flex';
  listen(tid);
}

// ========== الأدمن ==========
window.showTickets = async function(){
  document.getElementById('adminModal').classList.add('show');
  var all = await getDocs(collection(db,"support_tickets"));
  var list = document.getElementById('ticketsList');
  var html = '';
  
  var tickets = [];
  all.forEach(function(d){ var t = d.data(); if(t.status==='open'){ t.id = d.id; tickets.push(t); } });
  tickets.sort(function(a,b){ return b.updatedAt - a.updatedAt; });
  
  if(tickets.length === 0){ html = '<div class="empty"><i class="fas fa-check-circle" style="color:#10b981"></i><p>لا تذاكر مفتوحة</p></div>'; }
  else {
    for(var i=0;i<tickets.length;i++){
      var t = tickets[i];
      html += '<div class="ticket-card" onclick="adminOpen(\''+t.id+'\')">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'+
        '<div class="msg-av" style="width:32px;height:32px;border-color:'+(t.userColors?.frame||'#3b82f6')+'">'+(t.userAvatarType==='image'&&t.userAvatarUrl?'<img src="'+t.userAvatarUrl+'">':t.userEmoji||'👤')+'</div>'+
        '<div><strong>'+(t.userName||'مستخدم')+'</strong><br><small>📧 '+(t.userEmail||'?')+'</small></div>'+
        '</div>'+
        '<p style="color:#64748b;font-size:13px">💬 '+(t.lastMsg||'لا رسائل').substring(0,50)+'</p>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">'+
        '<small>🕐 '+new Date(t.updatedAt).toLocaleString('ar-SA')+'</small>'+
        '<button onclick="event.stopPropagation();delTicket(\''+t.id+'\')" style="background:#fee2e2;color:#dc2626;border:none;padding:4px 10px;border-radius:15px;cursor:pointer;font-size:11px"><i class="fas fa-trash"></i></button>'+
        '</div></div>';
    }
  }
  list.innerHTML = html;
};

window.adminOpen = async function(tid){
  document.getElementById('adminModal').classList.remove('show');
  ticketId = tid;
  document.getElementById('startBox').style.display = 'none';
  document.getElementById('inputBar').style.display = 'flex';
  listen(tid);
};

window.delTicket = async function(tid){
  if(!confirm('حذف التذكرة؟')) return;
  var msgs = await getDocs(collection(db,"support_tickets",tid,"messages"));
  var b = writeBatch(db);
  msgs.forEach(function(d){ b.delete(d.ref); });
  b.delete(doc(db,"support_tickets",tid));
  await b.commit();
  toast('🗑️ تم الحذف');
  showTickets();
  if(ticketId === tid){ ticketId = null; document.getElementById('msgContainer').innerHTML = ''; document.getElementById('inputBar').style.display = 'none'; }
};

// ========== حدث الإدخال ==========
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('msgInput').addEventListener('keypress', function(e){ if(e.key==='Enter') sendMsg(); });
});

onAuthStateChanged(auth, async function(user){
  if(user){ me = user; await loadMe(user.uid); }
  else { document.getElementById('msgContainer').innerHTML = '<div class="empty"><i class="fas fa-sign-in-alt"></i><p>يرجى تسجيل الدخول</p></div>'; }
});
</script>
</body>
</html>
